<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurSpace - For Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --primary-dark: #EE5A5A;
            --secondary: #FFE66D;
            --accent: #4ECDC4;
            --bg: #FFF5F5;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --shadow: 0 10px 40px rgba(255, 107, 107, 0.15);
            --shadow-hover: 0 20px 60px rgba(255, 107, 107, 0.25);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FFF5F5 0%, #FFF9F0 100%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            box-shadow: var(--shadow);
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
            z-index: 10;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .nav-item {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            font-size: 24px;
            position: relative;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            right: -5px;
            width: 4px;
            height: 30px;
            background: white;
            border-radius: 2px;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 20px 30px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .partner-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .partner-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #44A08D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .partner-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #2ECC71;
            border-radius: 50%;
            border: 2px solid white;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .partner-details h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .partner-details p {
            font-size: 13px;
            color: var(--text-light);
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
            color: var(--text);
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: linear-gradient(180deg, #FFF5F5 0%, #FFFFFF 100%);
        }

        .date-divider {
            text-align: center;
            color: var(--text-light);
            font-size: 12px;
            margin: 20px 0;
            position: relative;
        }

        .date-divider::before, .date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
        }

        .date-divider::before { left: 20%; }
        .date-divider::after { right: 20%; }

        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .message.received {
            align-self: flex-start;
            background: white;
            border-bottom-left-radius: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .message-media {
            max-width: 300px;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .message-media:hover {
            transform: scale(1.02);
        }

        .message-media img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Input Area */
        .input-container {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.2);
        }

        .input-actions {
            display: flex;
            gap: 5px;
            padding: 0 10px;
        }

        .input-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .input-btn:hover {
            background: rgba(255, 107, 107, 0.1);
            color: var(--primary);
            transform: scale(1.1);
        }

        .message-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 15px;
            outline: none;
            color: var(--text);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        /* Video Call Overlay */
        .video-call-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 100;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s;
        }

        .video-call-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .main-video {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2C3E50 0%, #34495E 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .main-video::before {
            content: '👤';
            font-size: 120px;
            opacity: 0.3;
        }

        .self-video {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
            height: 150px;
            background: linear-gradient(135deg, #34495E 0%, #2C3E50 100%);
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .self-video::before {
            content: '😊';
            font-size: 60px;
        }

        .call-controls {
            padding: 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
            color: white;
        }

        .call-btn.mute { background: rgba(255,255,255,0.2); }
        .call-btn.video { background: rgba(255,255,255,0.2); }
        .call-btn.end { background: #E74C3C; }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .call-btn.end:hover {
            background: #C0392B;
            transform: scale(1.1) rotate(90deg);
        }

        /* Gallery Sidebar */
        .gallery-sidebar {
            width: 350px;
            background: white;
            border-left: 1px solid rgba(0,0,0,0.05);
            display: none;
            flex-direction: column;
            animation: slideInRight 0.3s;
        }

        .gallery-sidebar.active {
            display: flex;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .gallery-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: var(--bg);
            transition: all 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item.video::after {
            content: '▶️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            opacity: 0.8;
        }

        /* Floating Hearts Animation */
        .heart {
            position: fixed;
            pointer-events: none;
            animation: float 4s ease-in infinite;
            opacity: 0;
            font-size: 24px;
            z-index: 1000;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            
            .gallery-sidebar {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                z-index: 50;
            }
            
            .message {
                max-width: 85%;
            }
        }

        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: white;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            align-self: flex-start;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Special Effects */
        .love-button {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .love-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }
    </style>
<base target="_blank">

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">💕</div>
            <div class="nav-item active" onclick="showTab('chat')" title="Chat">💬</div>
            <div class="nav-item" onclick="showTab('calls')" title="Calls">📹</div>
            <div class="nav-item" onclick="toggleGallery()" title="Media">🖼️</div>
            <div class="nav-item" onclick="showTab('calendar')" title="Calendar">📅</div>
            <div class="nav-item" onclick="showTab('settings')" title="Settings">⚙️</div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="partner-info">
                    <div class="partner-avatar">❤️</div>
                    <div class="partner-details">
                        <h2>My Love</h2>
                        <p>Online now</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="startVideoCall()" title="Video Call">📹</button>
                    <button class="icon-btn" onclick="startVoiceCall()" title="Voice Call">📞</button>
                    <button class="love-button" onclick="sendLove()">Send Love ❤️</button>
                </div>
            </header>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="date-divider">Today</div>
                
                <div class="message received">
                    Hey! How's your day going? 💭
                    <div class="message-time">10:30 AM</div>
                </div>

                <div class="message sent">
                    It's going great! Just thinking about you 😊
                    <div class="message-time">10:32 AM ✓✓</div>
                </div>

                <div class="message received">
                    Aww, you're so sweet! Look what I found today:
                    <div class="message-media">
                        <img src="https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=400&h=300&fit=crop" alt="Shared memory">
                    </div>
                    <div class="message-time">10:35 AM</div>
                </div>

                <div class="typing" id="typingIndicator" style="display: none;">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-actions">
                        <button class="input-btn" onclick="attachFile()" title="Attach">📎</button>
                        <button class="input-btn" onclick="openCamera()" title="Camera">📷</button>
                        <button class="input-btn" onclick="openGallery()" title="Gallery">🖼️</button>
                    </div>
                    <input type="text" class="message-input" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                </div>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>

            <!-- Video Call Overlay -->
            <div class="video-call-overlay" id="videoCallOverlay">
                <div class="video-container">
                    <div class="main-video">
                        <div style="color: white; font-size: 24px; opacity: 0.8;">Partner Camera</div>
                    </div>
                    <div class="self-video"></div>
                </div>
                <div class="call-controls">
                    <button class="call-btn mute" onclick="toggleMute()" title="Mute">🎤</button>
                    <button class="call-btn video" onclick="toggleVideo()" title="Video">📹</button>
                    <button class="call-btn end" onclick="endCall()" title="End Call">📞</button>
                </div>
            </div>
        </div>

        <!-- Gallery Sidebar -->
        <div class="gallery-sidebar" id="gallerySidebar">
            <div class="gallery-header">
                <h3>Our Memories 📸</h3>
                <button class="icon-btn" onclick="toggleGallery()">✕</button>
            </div>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=300&h=300&fit=crop" alt="Memory 1">
                </div>
                <div class="gallery-item video">
                    <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=300&h=300&fit=crop" alt="Memory 2">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=300&h=300&fit=crop" alt="Memory 3">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=300&h=300&fit=crop" alt="Memory 4">
                </div>
                <div class="gallery-item video">
                    <img src="https://images.unsplash.com/photo-1529333241880-0fc7855bb921?w=300&h=300&fit=crop" alt="Memory 5">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1518568814500-bf0f8d125f46?w=300&h=300&fit=crop" alt="Memory 6">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Navigation
        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'chat') {
                document.getElementById('chatContainer').style.display = 'flex';
            }
        }

        // Gallery Toggle
        function toggleGallery() {
            const gallery = document.getElementById('gallerySidebar');
            gallery.classList.toggle('active');
        }

        function openGallery() {
            toggleGallery();
        }

        // Messaging
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text) {
                addMessage(text, 'sent');
                input.value = '';
                
                // Simulate received message
                setTimeout(() => {
                    showTyping();
                    setTimeout(() => {
                        hideTyping();
                        const replies = [
                            "That's so nice! 💕",
                            "I miss you! 😘",
                            "Can't wait to see you!",
                            "You're the best! ❤️",
                            "Sending you virtual hugs! 🤗"
                        ];
                        addMessage(replies[Math.floor(Math.random() * replies.length)], 'received');
                    }, 2000);
                }, 1000);
            }
        }

        function addMessage(text, type) {
            const container = document.getElementById('chatContainer');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const checkmarks = type === 'sent' ? ' ✓✓' : '';
            
            message.innerHTML = `
                ${text}
                <div class="message-time">${time}${checkmarks}</div>
            `;
            
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function showTyping() {
            document.getElementById('typingIndicator').style.display = 'flex';
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        // Video Call
        function startVideoCall() {
            document.getElementById('videoCallOverlay').classList.add('active');
        }

        function startVoiceCall() {
            alert('Starting voice call... 📞');
        }

        function endCall() {
            document.getElementById('videoCallOverlay').classList.remove('active');
        }

        function toggleMute() {
            event.target.style.background = event.target.style.background === 'rgb(231, 76, 60)' ? 'rgba(255,255,255,0.2)' : '#E74C3C';
        }

        function toggleVideo() {
            event.target.style.background = event.target.style.background === 'rgb(231, 76, 60)' ? 'rgba(255,255,255,0.2)' : '#E74C3C';
        }

        // Special Effects
        function sendLove() {
            createHearts();
            addMessage('Sent you lots of love! ❤️❤️❤️', 'sent');
            
            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addMessage('Received your love! Sending back! 💕💕💕', 'received');
                    createHearts();
                }, 1500);
            }, 500);
        }

        function createHearts() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 4000);
                }, i * 200);
            }
        }

        // File Attachments
        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    const container = document.getElementById('chatContainer');
                    const message = document.createElement('div');
                    message.className = 'message sent';
                    message.innerHTML = `
                        <div class="message-media">
                            <img src="${url}" alt="Shared file">
                        </div>
                        <div class="message-time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} ✓✓</div>
                    `;
                    container.appendChild(message);
                    container.scrollTop = container.scrollHeight;
                }
            };
            input.click();
        }

        function openCamera() {
            alert('Camera feature would open here 📷');
        }

        // Initialize with some animation
        window.onload = function() {
            document.querySelectorAll('.message').forEach((msg, index) => {
                msg.style.animationDelay = (index * 0.1) + 's';
            });
        };
    </script>
</body>
</html>
